<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatWave</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0f14; color: #e2e4f0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
  #joinScreen { position: fixed; inset: 0; background: #0d0f14; display: flex; align-items: center; justify-content: center; z-index: 99; }
  .join-card { background: #111318; border: 1px solid #232633; border-radius: 20px; padding: 32px; width: 90%; max-width: 360px; display: flex; flex-direction: column; gap: 16px; }
  .join-card h2 { font-size: 22px; }
  .join-card input { background: #161820; border: 1px solid #232633; border-radius: 10px; color: #e2e4f0; font-size: 15px; padding: 12px 14px; outline: none; width: 100%; }
  .join-card button { background: #6c8aff; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .topbar { background: #111318; border-bottom: 1px solid #232633; padding: 14px 16px; font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .topbar span { background: linear-gradient(135deg,#6c8aff,#ff6b9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .sys-msg { text-align: center; font-size: 12px; color: #5a5e78; font-style: italic; padding: 4px 0; }
  .msg-block { display: flex; flex-direction: column; max-width: 75%; }
  .msg-block.me { align-self: flex-end; align-items: flex-end; }
  .msg-block.other { align-self: flex-start; }
  .sender { font-size: 11px; color: #7c82a0; margin-bottom: 3px; padding: 0 4px; }
  .bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; }
  .me .bubble { background: #1e2a5e; border: 1px solid #3a4fa8; border-bottom-right-radius: 4px; }
  .other .bubble { background: #1a1c26; border: 1px solid #232633; border-bottom-left-radius: 4px; }
  .time { font-size: 10px; color: #5a5e78; margin-top: 3px; padding: 0 4px; }
  .input-area { padding: 12px 14px 20px; border-top: 1px solid #232633; display: flex; gap: 8px; }
  .input-area input { flex: 1; background: #161820; border: 1px solid #232633; border-radius: 12px; color: #e2e4f0; font-size: 14px; padding: 11px 14px; outline: none; }
  .input-area input:focus { border-color: #6c8aff; }
  .input-area button { background: #6c8aff; color: #fff; border: none; border-radius: 12px; padding: 11px 18px; font-size: 15px; cursor: pointer; }
</style>
</head>
<body>

<div id="joinScreen">
  <div class="join-card">
    <h2>💬 ChatWave</h2>
    <p style="color:#7c82a0;font-size:13px">Enter your name to join</p>
    <input id="nameInput" placeholder="Your name..." maxlength="20" />
    <button onclick="joinChat()">Join Chat →</button>
  </div>
</div>

<div class="topbar">
  💬 <span>ChatWave</span>
  <span style="font-size:12px;color:#7c82a0;margin-left:auto" id="onlineCount"></span>
</div>

<div id="messages"></div>

<div class="input-area">
  <input id="msgInput" placeholder="Type a message..." 
    onkeydown="if(event.key==='Enter') sendMsg()" />
  <button onclick="sendMsg()">➤</button>
</div>

<script>
  const socket = io();
  let myName = '';

  function joinChat() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) return;
    myName = name;
    document.getElementById('joinScreen').style.display = 'none';
    socket.emit('join', name);
    document.getElementById('msgInput').focus();
  }

  function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    socket.emit('message', { user: myName, text });
    input.value = '';
  }

  socket.on('message', (data) => {
    const area = document.getElementById('messages');
    if (data.type === 'system') {
      const div = document.createElement('div');
      div.className = 'sys-msg';
      div.textContent = data.text;
      area.appendChild(div);
    } else {
      const isMe = data.user === myName;
      const block = document.createElement('div');
      block.className = 'msg-block ' + (isMe ? 'me' : 'other');
      const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      block.innerHTML = `
        ${!isMe ? `<div class="sender">${data.user}</div>` : ''}
        <div class="bubble">${data.text}</div>
        <div class="time">${time}</div>`;
      area.appendChild(block);
    }
    area.scrollTop = area.scrollHeight;
  });

  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinChat();
  });
</script>
</body>
    </html>
